name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ secrets.ENV }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: ENV_FILE
          script: |
            cd /var/www/real_estate_app/repo
            git pull origin main
            cd backend
            echo "$ENV_FILE" > .env
            npm install
            npm run build
            pm2 restart real_estate_backend
            sleep 3
            curl -f http://127.0.0.1:3001/health
